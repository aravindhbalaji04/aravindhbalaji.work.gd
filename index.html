<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aravindh Balaji</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 20% 20%, #d4e5ff, #f7f9ff 40%),
          radial-gradient(circle at 80% 0%, #ffe6f2, #fff8fb 35%),
          radial-gradient(circle at 50% 100%, #e7fff2, #f9fffb 30%),
          linear-gradient(180deg, #fdfdff 0%, #f7faff 100%);
        color: #1e293b;
      }

      .card {
        background: rgba(255, 255, 255, 0.85);
        border: 1px solid rgba(148, 163, 184, 0.35);
        border-radius: 16px;
        padding: 40px 48px;
        box-shadow: 0 20px 70px rgba(15, 23, 42, 0.18);
        max-width: 520px;
        text-align: center;
        backdrop-filter: blur(10px);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 2.5rem;
        letter-spacing: -0.02em;
      }

      p {
        margin: 0;
        font-size: 1.1rem;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Aravindh Balaji</h1>
      <p>Welcome! Thanks for stopping by my site.</p>
    </main>
  </body>
</html>
