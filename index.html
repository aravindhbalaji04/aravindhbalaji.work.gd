<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Aravindh Balaji</title>
        <style>
            :root {
                color-scheme: light dark;
                font-family:
                    "Segoe UI",
                    system-ui,
                    -apple-system,
                    sans-serif;
            }
            body {
                margin: 0;
                min-height: 100vh;
                background: #f6f3fa;
                color: #1e293b;
            }
            .container {
                display: flex;
                min-height: 100vh;
                max-width: 1100px;
                margin: 0 auto;
                box-sizing: border-box;
            }
            .sidebar {
                width: 220px;
                background: #fff;
                border-right: 1px solid #ececec;
                padding: 32px 0 0 0;
                display: flex;
                flex-direction: column;
                align-items: flex-start;
                min-height: 100vh;
                box-shadow: 2px 0 16px #0001;
            }
            .sidebar-header {
                padding: 0 32px 24px 32px;
                font-weight: bold;
                font-size: 1.2rem;
                color: #22223b;
            }
            .sidebar-title {
                font-size: 1.3rem;
                font-weight: 600;
                letter-spacing: -0.01em;
            }
            .sidebar-links {
                display: flex;
                flex-direction: column;
                gap: 12px;
                padding: 0 32px;
                margin-top: 12px;
                width: 100%;
            }
            .sidebar-links a {
                color: #22223b;
                text-decoration: none;
                font-size: 1.05rem;
                padding: 8px 12px;
                border-radius: 8px;
                transition: background 0.15s;
            }
            .sidebar-links a:hover {
                background: #f3f0ff;
                color: #5f3dc4;
            }
            .main-content {
                flex: 1;
                padding: 48px 64px;
                background: #fff;
                border-radius: 0 16px 16px 0;
                margin: 32px 0 32px 0;
                box-shadow: 0 8px 32px #0001;
                min-width: 0;
            }
            h1 {
                margin: 0 0 12px;
                font-size: 2.2rem;
                letter-spacing: -0.02em;
            }
            p {
                margin: 0;
                font-size: 1.1rem;
                color: #475569;
            }
            @media (max-width: 700px) {
                .container {
                    flex-direction: column;
                }
                .sidebar {
                    width: 100%;
                    min-height: unset;
                    border-radius: 0 0 16px 16px;
                    box-shadow: 0 2px 16px #0001;
                }
                .main-content {
                    padding: 24px 8vw;
                    margin: 0;
                    border-radius: 0 0 16px 16px;
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <aside class="sidebar">
                <div class="sidebar-header">
                    <span class="sidebar-title">Aravindh Balaji</span>
                </div>
                <nav class="sidebar-links">
                    <a
                        id="github-link"
                        href="#"
                        target="_blank"
                        rel="noopener"
                        style="display: flex; align-items: center; gap: 8px"
                    >
                        <svg
                            width="20"
                            height="20"
                            viewBox="0 0 16 16"
                            fill="none"
                            xmlns="http://www.w3.org/2000/svg"
                        >
                            <path
                                fill-rule="evenodd"
                                clip-rule="evenodd"
                                d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.01.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.11.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.19 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"
                                fill="#181717"
                            />
                        </svg>
                        GitHub
                    </a>
                    <a
                        id="leetcode-link"
                        href="#"
                        target="_blank"
                        rel="noopener"
                        style="display: flex; align-items: center; gap: 8px"
                    >
                        <img
                            src="/tmp/copilot-image-d8a1ff.png"
                            alt="LeetCode"
                            width="20"
                            height="20"
                            style="
                                display: inline-block;
                                vertical-align: middle;
                            "
                        />
                        LeetCode
                    </a>
                </nav>
            </aside>
            <main class="main-content">
                <div
                    style="
                        width: 100%;
                        display: flex;
                        justify-content: center;
                        margin-bottom: 2em;
                    "
                >
                    <a
                        id="resume-link"
                        href="#"
                        target="_blank"
                        style="
                            display: inline-block;
                            padding: 0.6em 1.4em;
                            background: #fff;
                            border: 1.5px solid black;
                            color: black;
                            font-weight: 500;
                            border-radius: 8px;
                            text-decoration: none;
                            transition:
                                background 0.15s,
                                color 0.15s;
                            box-shadow: none;
                            font-size: 1.05rem;
                            letter-spacing: 0.01em;
                        "
                        >Click here for my resume</a
                    >
                </div>
                <h1>Aravindh Balaji</h1>
                <div
                    style="
                        display: flex;
                        flex-direction: column;
                        align-items: center;
                        margin: 2.5em 0 0 0;
                    "
                >
                    <div
                        id="now-playing"
                        style="
                            font-size: 1.3rem;
                            font-weight: 500;
                            margin-bottom: 0.7em;
                        "
                    >
                        Now listening to
                    </div>
                    <div
                        id="music-info"
                        style="
                            min-width: 260px;
                            min-height: 60px;
                            text-align: center;
                        "
                    >
                        <span id="music-loading">Loading current track...</span>
                    </div>
                </div>
            </main>
        </div>
        <script src="./config.js"></script>
        <script>
            // === Last.fm Now Playing Poller ===
            const POLL_INTERVAL = 5000; // 5 seconds
            const appConfig = window.APP_CONFIG || {};
            const API_URL = appConfig.NOW_PLAYING_API_URL || "";

            function applyConfiguredLinks() {
                const linkMap = [
                    ["github-link", appConfig.GITHUB_URL],
                    ["leetcode-link", appConfig.LEETCODE_URL],
                    ["resume-link", appConfig.RESUME_URL],
                ];

                linkMap.forEach(([id, href]) => {
                    const el = document.getElementById(id);
                    if (!el) return;
                    if (href) {
                        el.href = href;
                    } else {
                        el.removeAttribute("href");
                        el.style.opacity = "0.6";
                        el.style.pointerEvents = "none";
                    }
                });
            }

            let lastTrackId = null;
            let lastTrackState = null;

            async function fetchNowPlaying() {
                if (!API_URL) {
                    document.getElementById("music-info").innerHTML =
                        '<span style="color:red;">NOW_PLAYING_API_URL is not configured.</span>';
                    return;
                }

                try {
                    const res = await fetch(API_URL);
                    const data = await res.json();
                    const track = data.track;
                    let newTrackId =
                        track &&
                        track["@attr"] &&
                        track["@attr"].nowplaying === "true"
                            ? `${track.artist["#text"]}|${track.name}`
                            : null;
                    let newTrackState =
                        track &&
                        track["@attr"] &&
                        track["@attr"].nowplaying === "true"
                            ? "playing"
                            : "notplaying";
                    const infoDiv = document.getElementById("music-info");
                    // Only show loading if state is changing
                    if (
                        lastTrackId !== newTrackId ||
                        lastTrackState !== newTrackState
                    ) {
                        infoDiv.innerHTML =
                            '<span id="music-loading">Loading current track...</span>';
                    }
                    // After a short delay, update the UI
                    setTimeout(
                        () => {
                            updateMusicInfo(track);
                            lastTrackId = newTrackId;
                            lastTrackState = newTrackState;
                        },
                        lastTrackId !== newTrackId ||
                            lastTrackState !== newTrackState
                            ? 400
                            : 0,
                    );
                } catch (e) {
                    document.getElementById("music-info").innerHTML =
                        '<span style="color:red;">Error loading track info.</span>';
                    lastTrackId = null;
                    lastTrackState = null;
                }
            }

            function updateMusicInfo(track) {
                const infoDiv = document.getElementById("music-info");
                if (!track) {
                    infoDiv.innerHTML = "<span>No track info available.</span>";
                    return;
                }
                if (track["@attr"] && track["@attr"].nowplaying === "true") {
                    const img =
                        track.image?.find((i) => i.size === "medium")?.[
                            "#text"
                        ] || "";
                    infoDiv.innerHTML = `
            <div style="display:flex;align-items:center;justify-content:center;gap:1em;">
              ${img ? `<img src="${img}" alt="Album Art" style="width:48px;height:48px;border-radius:8px;box-shadow:0 2px 8px #0001;">` : ""}
              <div style="text-align:left;">
                <div><strong>${track.name}</strong></div>
                <div style="color:#64748b;">${track.artist["#text"]}</div>
              </div>
            </div>
          `;
                } else {
                    infoDiv.innerHTML =
                        "<span>Not playing anything right now.</span>";
                }
            }

            // Initial load and polling
            applyConfiguredLinks();
            fetchNowPlaying();
            setInterval(fetchNowPlaying, POLL_INTERVAL);
        </script>
    </body>
</html>
